<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Calculadora</title>
    <style>
      body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; }
      .matrix-container { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
      .matrix-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
      input.celda { width: 40px; height: 40px; margin: 2px; text-align: center; }
      button { background: #0056b3; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin: 5px; }
      button:hover { background: #004494; }
      .controles-servidor { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 8px; display: inline-block; }
    </style>
  </head>
  <body>
    <h2>Matrices </h2>

    <div>
      <input type="number" id="filas" placeholder="Filas" style="width: 60px;"> x
      <input type="number" id="columnas" placeholder="Columnas" style="width: 60px;">
      <button onclick="dibujarMatrices()">Dibujar Matrices</button>
    </div>

    <div class="matrix-container" id="contenedor-matrices"></div>

    <div id="controles" class="controles-servidor" style="display: none;">
        <h4>Calcular en Local (Navegador)</h4>
        <button onclick="operarLocal('sumar')">Sumar Local</button>
        <button onclick="operarLocal('multiplicar')">Multiplicar Local</button>
        
        <h4>Calcular en Servidor</h4>
        <button onclick="operarServidor('sumar', 3000)">Sumar (NodeJS)</button>
        <button onclick="operarServidor('multiplicar', 3000)">Multiplicar (NodeJS)</button>
        <button onclick="operarServidor('sumar', 5000)">Sumar (Python)</button>
        <button onclick="operarServidor('multiplicar', 5000)">Multiplicar (Python)</button>
    </div>

    <div id="resultado" style="margin-top: 20px; font-weight: bold;"></div>

    <script src="script.js"></script>
  </body>
</html>
