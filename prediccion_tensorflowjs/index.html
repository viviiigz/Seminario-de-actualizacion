<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>prediccion con tensorflow.js</title>

    <!-- hoja de estilos propia del proyecto -->
    <link rel="stylesheet" href="css/estilos.css">

    <!-- libreria de tensorflow.js: permite crear, entrenar y usar modelos de machine learning en el navegador -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

    <!-- libreria chart.js: permite crear graficos (lineas, barras, etc) de forma sencilla -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="contenedor">

        <h1>prediccion con tensorflow.js</h1>

        <!-- boton que dispara el entrenamiento del modelo -->
        <button id="btn-entrenar" class="boton boton-verde">entrenar modelo</button>

        <hr>

        <h2>grafica de perdida durante el entrenamiento</h2>

        <!-- canvas: aca chart.js va a dibujar la curva de perdida -->
        <div class="contenedor-grafico">
            <canvas id="grafico-perdida"></canvas>
        </div>

        <!-- aca se va a mostrar el texto con perdida inicial, final y % de reduccion -->
        <p id="info-perdida"></p>

        <hr>

        <h2>prediccion</h2>

        <label for="input-x">valores de x (separados por comas):</label>
        <div class="fila-prediccion">
            <input type="text" id="input-x" placeholder="ejemplo: 10, 20, 25">
            <button id="btn-predecir" class="boton boton-verde">predecir</button>
        </div>

        <!-- texto que indica el estado actual (sin entrenar, entrenando, listo, etc) -->
        <p id="estado">estado: listo</p>

        <!-- aca se van a listar los resultados de las predicciones -->
        <div id="resultados"></div>

    </div>

    <!-- ===========================================================
         archivos javascript propios del proyecto.
         el orden de carga importa: cada archivo usa cosas
         definidas en los archivos anteriores.
         =========================================================== -->
    <script src="js/datos.js"></script>
    <script src="js/modelo.js"></script>
    <script src="js/grafico.js"></script>
    <script src="js/prediccion.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
